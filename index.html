<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a0a2e">
    <title>Aqib 💞 Sara yeh ho</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Appwrite SDK -->
    <script src="https://cdn.appwrite.io/sdk/2.16.0/appwrite.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-neon-pink: #FF006E;
            --primary-neon-blue: #00F5FF;
            --primary-neon-purple: #B967FF;
            --secondary-neon-green: #39FF14;
            --accent-gold: #FFD700;
            --background-dark: #0a0a1a;
            --background-gradient-start: #1a0a2e;
            --background-gradient-end: #0a1a2e;
            --text-white: #FFFFFF;
            --text-soft: #E0E0E0;
            --glass-background: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Particles */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-particle {
            position: absolute;
            font-size: 20px;
            animation: floatHeart 6s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            50% { transform: translateY(-20vh) rotate(180deg) scale(1.2); }
        }

        /* Sections */
        .section {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hero Section */
        #hero-section {
            text-align: center;
            padding: 2rem;
        }

        .hero-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-neon-pink), var(--accent-gold), var(--primary-neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: glowTitle 2s ease-in-out infinite alternate;
        }

        @keyframes glowTitle {
            from { filter: drop-shadow(0 0 20px rgba(255, 0, 110, 0.5)); }
            to { filter: drop-shadow(0 0 40px rgba(0, 245, 255, 0.8)); }
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-soft);
            margin-bottom: 3rem;
        }

        .start-btn {
            padding: 1rem 3rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, var(--primary-neon-pink), var(--primary-neon-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 50px rgba(255, 0, 110, 0.6);
        }

        /* Login Section */
        #login-section {
            padding: 2rem;
        }

        .login-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

        .login-subtitle {
            color: var(--text-soft);
            margin-bottom: 3rem;
            text-align: center;
        }

        .user-cards-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }

        .user-card {
            flex: 1;
            min-width: 200px;
            max-width: 250px;
            padding: 2rem;
            background: var(--glass-background);
            backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .user-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-neon-pink);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.4);
        }

        .user-card.selected {
            border-color: var(--primary-neon-blue);
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
            background: rgba(0, 245, 255, 0.1);
        }

        .user-avatar {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Chat Section */
        #chat-section {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 0;
        }

        #chat-section.active {
            display: flex;
        }

        .chat-header {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(26, 10, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .chat-header-title {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .online-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--secondary-neon-green);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--secondary-neon-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .chat-header-controls {
            display: flex;
            gap: 1rem;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            color: var(--primary-neon-pink);
            transform: scale(1.1);
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            position: relative;
        }

        .message-wrapper.aqib {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.sara {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 1rem 1.25rem;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .message-wrapper.aqib .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 5px;
        }

        .message-wrapper.sara .message-bubble {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-bottom-left-radius: 5px;
        }

        .message-bubble:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .message-sender {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            opacity: 0.9;
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.4;
        }

        .message-time {
            font-size: 0.7rem;
            margin-top: 0.5rem;
            opacity: 0.7;
        }

        .message-actions {
            position: absolute;
            top: -10px;
            right: -10px;
            display: none;
            gap: 0.5rem;
        }

        .message-wrapper:hover .message-actions {
            display: flex;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .action-btn:hover {
            transform: scale(1.15);
        }

        .action-btn.delete:hover {
            background: #ff4444;
            color: white;
        }

        .reactions-container {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .reaction-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            backdrop-filter: blur(5px);
        }

        /* Input Area */
        .input-area {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(26, 10, 46, 0.98);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 1rem 1.25rem;
            background: var(--glass-background);
            border: 2px solid var(--glass-border);
            border-radius: 25px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            border-color: var(--primary-neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(45deg, var(--primary-neon-pink), var(--primary-neon-purple));
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.6);
        }

        /* Reaction Modal */
        .reaction-modal {
            display: none;
            position: fixed;
            background: rgba(26, 10, 46, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1rem;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .reaction-modal.show {
            display: block;
            animation: popIn 0.2s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .reaction-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
        }

        .reaction-option {
            font-size: 1.8rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 10px;
            text-align: center;
        }

        .reaction-option:hover {
            transform: scale(1.3);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-soft);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--primary-neon-pink);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary-neon-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(26, 10, 46, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .user-cards-container { flex-direction: column; align-items: center; }
            .user-card { max-width: 100%; width: 100%; }
            .message-wrapper { max-width: 85%; }
            .chat-header-title { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .hero-title { font-size: 2rem; }
            .start-btn { padding: 0.8rem 2rem; font-size: 1.1rem; }
            .message-bubble { padding: 0.8rem 1rem; }
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(255, 0, 110, 0.3); border-radius: 3px; }
    </style>
</head>

    <script>
        // ============================================
        // APPWRITE CONFIGURATION (YOUR CREDENTIALS)
        // ============================================
        const APPWRITE_CONFIG = {
            endpoint: 'https://fra.cloud.appwrite.io/v1',
            projectId: '69ece6510006b3f2bc8d',
            databaseId: '69ece6da000ae6d364d0',
            collectionId: 'messages'
        };

        // Global Variables
        let client = null;
        let databases = null;
        let currentUser = null;
        let soundEnabled = true;
        let selectedMessageId = null;
        let unsubscribeRealtime = null;

        // ============================================
        // INITIALIZE APPWRITE
        // ============================================
        function initAppwrite() {
            try {
                client = new Appwrite.Client();
                client
                    .setEndpoint(APPWRITE_CONFIG.endpoint)
                    .setProject(APPWRITE_CONFIG.projectId);

                databases = new Appwrite.Databases(client);
                
                console.log('✅ Appwrite Connected Successfully!');
                updateConnectionStatus(true);
                return true;
            } catch (error) {
                console.error('❌ Appwrite Connection Failed:', error);
                updateConnectionStatus(false);
                showToast('⚠️ Using offline mode (LocalStorage)');
                return false;
            }
        }

        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connection-status');
            if (connected) {
                statusEl.textContent = 'Connected ✓';
                statusEl.style.color = '#39FF14';
            } else {
                statusEl.textContent = 'Offline Mode';
                statusEl.textContent = '#FFD700';
            }
        }

        // ============================================
        // PARTICLES SYSTEM
        // ============================================
        function createParticles() {
            const container = document.getElementById('particles-container');
            const hearts = ['❤️', '💕', '💖', '💗', '💝', '💘', '♥️', '🌹'];
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                container.appendChild(heart);
            }
        }

        // ============================================
        // NAVIGATION FUNCTIONS
        // ============================================
        function showLogin() {
            document.getElementById('hero-section').classList.remove('active');
            document.getElementById('login-section').classList.add('active');
            playSound('send');
        }

        function selectUser(username) {
            if (username !== 'Aqib' && username !== 'Sara') {
                showToast('Only Aqib and Sara can join! 💕');
                return;
            }
            
            currentUser = username;
            
            // Visual feedback
            document.querySelectorAll('.user-card').forEach(card => card.classList.remove('selected'));
            document.getElementById(`card-${username.toLowerCase()}`).classList.add('selected');
            
            playSound('send');
            
            setTimeout(() => {
                showChat();
            }, 500);
        }

        function showChat() {
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('chat-section').classList.add('active');
            
            const input = document.getElementById('message-input');
            input.placeholder = `Type a message as ${currentUser}...`;
            
            loadMessages();
            setupRealtime();
        }

        function logout() {
            if (unsubscribeRealtime) {
                unsubscribeRealtime();
            }
            currentUser = null;
            document.getElementById('chat-section').classList.remove('active');
            document.getElementById('hero-section').classList.add('active');
            document.querySelectorAll('.user-card').forEach(card => card.classList.remove('selected'));
            playSound('delete');
        }

        // ============================================
        // SOUND SYSTEM
        // ============================================
        function playSound(type) {
            if (!soundEnabled) return;
            
            const soundMap = {
                'send': 'sound-send',
                'receive': 'sound-receive',
                'reaction': 'sound-reaction',
                'delete': 'sound-delete'
            };
            
            const audio = document.getElementById(soundMap[type]);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('sound-toggle');
            btn.innerHTML = soundEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
            showToast(soundEnabled ? '🔊 Sound On' : '🔇 Sound Off');
        }

        // ============================================
        // TOAST NOTIFICATIONS
        // ============================================
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ============================================
        // MESSAGE FUNCTIONS (WITH APPWRITE)
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) {
                showToast('Please type a message first! 💬');
                return;
            }
            
            if (!currentUser) {
                showToast('Please select a user first!');
                return;
            }
            
            const messageId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const message = {
                sender: currentUser,
                content: text,
                timestamp: new Date().toISOString(),
                reactions: []
            };
            
            try {
                // Save to Appwrite Database
                if (databases) {
                    await databases.createDocument(
                        APPWRITE_CONFIG.databaseId,
                        APPWRITE_CONFIG.collectionId,
                        messageId,
                        message
                    );
                    console.log('✅ Message saved to Appwrite:', messageId);
                } else {
                    // Fallback to LocalStorage
                    saveMessageToLocal({ ...message, $id: messageId });
                }
            } catch (error) {
                console.error('Error saving message:', error);
                // Fallback to local storage
                saveMessageToLocal({ ...message, $id: messageId });
                showToast('⚠️ Saved locally (offline mode)');
            }
            
            input.value = '';
            playSound('send');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function appendMessage(message) {
            const container = document.getElementById('messages-container');
            const emptyState = document.getElementById('empty-state');
            
            if (emptyState) {
                emptyState.style.display = 'none';
            }
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${message.sender.toLowerCase()}`;
            wrapper.id = `msg-${message.$id}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const reactionsHtml = message.reactions && message.reactions.length > 0 
                ? `<div class="reactions-container">${message.reactions.map(r => `<span class="reaction-badge">${r.emoji} ${r.count || 1}</span>`).join('')}</div>`
                : '';
            
            wrapper.innerHTML = `
                <div class="message-bubble" onclick="showReactionModal(event, '${message.$id}')">
                    <div class="message-sender">${message.sender}</div>
                    <div class="message-text">${escapeHtml(message.content)}</div>
                    <div class="message-time">${time}</div>
                    <div class="message-actions">
                        <button class="action-btn delete" onclick="deleteMessage('${message.$id}', event)" title="Delete message">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                ${reactionsHtml}
            `;
            
            container.appendChild(wrapper);
            scrollToBottom();
            
            if (message.sender !== currentUser) {
                playSound('receive');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        // ============================================
        // LOAD MESSAGES FROM APPWRITE
        // ============================================
        async function loadMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '<div style="text-align:center;padding:2rem;"><div class="loading-spinner"></div><p style="margin-top:1rem;">Loading messages... 💬</p></div>';
            
            try {
                if (databases) {
                    // Fetch last 500 messages from Appwrite
                    const response = await databases.listDocuments(
                        APPWRITE_CONFIG.databaseId,
                        APPWRITE_CONFIG.collectionId,
                        [
                            Appwrite.Query.orderAsc('$createdAt'),
                            Appwrite.Query.limit(500)
                        ]
                    );
                    
                    container.innerHTML = '';
                    
                    if (response.documents.length === 0) {
                        showEmptyState(container);
                    } else {
                        response.documents.forEach(doc => {
                            appendMessage(doc);
                        });
                        showToast(`✅ Loaded ${response.documents.length} messages`);
                    }
                } else {
                    loadFromLocalStorage();
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                showToast('⚠️ Loading from local storage...');
                loadFromLocalStorage();
            }
        }

        function showEmptyState(container) {
            container.innerHTML = `
                <div class="empty-state" id="empty-state">
                    <i class="fas fa-comments"></i>
                    <h3>No messages yet</h3>
                    <p>Start the conversation with love! 💕</p>
                </div>
            `;
        }

        // ============================================
        // LOCAL STORAGE FALLBACK
        // ============================================
        function saveMessageToLocal(message) {
            let messages = JSON.parse(localStorage.getItem('love_chat_messages') || '[]');
            messages.push(message);
            if (messages.length > 500) {
                messages = messages.slice(-500);
            }
            localStorage.setItem('love_chat_messages', JSON.stringify(messages));
            appendMessage(message);
        }

        function loadFromLocalStorage() {
            const container = document.getElementById('messages-container');
            const messages = JSON.parse(localStorage.getItem('love_chat_messages') || '[]');
            
            container.innerHTML = '';
            
            if (messages.length === 0) {
                showEmptyState(container);
            } else {
                messages.forEach(msg => appendMessage(msg));
            }
        }

        // ============================================
        // REAL-TIME SUBSCRIPTION (LIVE MESSAGES)
        // ============================================
        function setupRealtime() {
            try {
                if (typeof Appwrite !== 'undefined' && client) {
                    console.log('🔌 Setting up real-time subscription...');
                    
                    // Subscribe to document creation events
                    unsubscribeRealtime = client.subscribe(
                        `databases.${APPWRITE_CONFIG.databaseId}.collections.${APPWRITE_CONFIG.collectionId}.documents`,
                        (response) => {
                            console.log('📨 Real-time event:', response.events);
                            
                            if (response.events.includes('databases.*.collections.*.documents.create')) {
                                const newDoc = response.payload;
                                
                                // Check if message already exists in DOM to avoid duplicates
                                if (!document.getElementById(`msg-${newDoc.$id}`)) {
                                    console.log('✨ New message received:', newDoc.content);
                                    appendMessage(newDoc);
                                    
                                    // Show notification for incoming message
                                    if (newDoc.sender !== currentUser) {
                                        showToast(`💕 New message from ${newDoc.sender}`);
                                    }
                                }
                            }
                        }
                    );
                    
                    console.log('✅ Real-time subscription ACTIVE! Messages will appear live!');
                } else {
                    console.log('⚠️ Real-time not available, using polling fallback');
                    setInterval(loadMessages, 5000);
                }
            } catch (error) {
                console.error('❌ Real-time setup error:', error);
                setInterval(loadMessages, 5000);
            }
        }

        // ============================================
        // DELETE MESSAGE
        // ============================================
        async function deleteMessage(messageId, event) {
            event.stopPropagation();
            
            if (confirm('Are you sure you want to delete this message? 🗑️')) {
                try {
                    if (databases && !messageId.startsWith('msg_')) {
                        await databases.deleteDocument(
                            APPWRITE_CONFIG.databaseId,
                            APPWRITE_CONFIG.collectionId,
                            messageId
                        );
                    }
                    
                    const msgElement = document.getElementById(`msg-${messageId}`);
                    if (msgElement) {
                        msgElement.style.animation = 'fadeOut 0.3s ease-out forwards';
                        setTimeout(() => msgElement.remove(), 300);
                    }
                    
                    // Remove from localStorage too
                    let messages = JSON.parse(localStorage.getItem('love_chat_messages') || '[]');
                    messages = messages.filter(m => m.$id !== messageId);
                    localStorage.setItem('love_chat_messages', JSON.stringify(messages));
                    
                    playSound('delete');
                    showToast('Message deleted ✨');
                } catch (error) {
                    console.error('Error deleting message:', error);
                    showToast('Error deleting message');
                }
            }
        }

        // ============================================
        // REACTION SYSTEM
        // ============================================
        function showReactionModal(event, messageId) {
            event.stopPropagation();
            selectedMessageId = messageId;
            
            const modal = document.getElementById('reaction-modal');
            const rect = event.target.getBoundingClientRect();
            
            modal.style.left = rect.left + 'px';
            modal.style.top = (rect.top - 120) + 'px';
            modal.classList.add('show');
        }

        async function addReaction(emoji) {
            if (!selectedMessageId) return;
            
            const modal = document.getElementById('reaction-modal');
            modal.classList.remove('show');
            
            try {
                const msgElement = document.getElementById(`msg-${selectedMessageId}`);
                if (msgElement) {
                    let reactionsContainer = msgElement.querySelector('.reactions-container');
                    if (!reactionsContainer) {
                        reactionsContainer = document.createElement('div');
                        reactionsContainer.className = 'reactions-container';
                        msgElement.querySelector('.message-bubble').after(reactionsContainer);
                    }
                    
                    let existingBadge = Array.from(reactionsContainer.children).find(badge => badge.textContent.includes(emoji));
                    if (existingBadge) {
                        const count = parseInt(existingBadge.textContent.match(/\d+/)?.[0] || 1) + 1;
                        existingBadge.textContent = `${emoji} ${count}`;
                    } else {
                        const badge = document.createElement('span');
                        badge.className = 'reaction-badge';
                        badge.textContent = `${emoji} 1`;
                        reactionsContainer.appendChild(badge);
                    }
                }
                
                playSound('reaction');
                showToast(`Reaction added: ${emoji} 💖`);
            } catch (error) {
                console.error('Error adding reaction:', error);
            }
            
            selectedMessageId = null;
        }

        // Close modal when clicking outside
        document.addEventListener('click', (event) => {
            const modal = document.getElementById('reaction-modal');
            if (!modal.contains(event.target) && !event.target.closest('.message-bubble')) {
                modal.classList.remove('show');
            }
        });

        // ============================================
        // INITIALIZATION ON PAGE LOAD
        // ============================================
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Initializing Aqib 💞 Sara Love Chat...');
            createParticles();
            initAppwrite();
            
            // Enable audio after user interaction (required by browsers)
            document.body.addEventListener('click', () => {
                const sounds = ['sound-send', 'sound-receive', 'sound-reaction', 'sound-delete'];
                sounds.forEach(id => {
                    const audio = document.getElementById(id);
                    if (audio) audio.load();
                });
            }, { once: true });
            
            console.log('✅ Application Ready! Select Aqib or Sara to start chatting 💕');
        });

        // Add fadeOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                from { opacity: 1; transform: scale(1); }
                to { opacity: 0; transform: scale(0.8); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
