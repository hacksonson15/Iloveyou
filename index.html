<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqib 💞 Sara yeh ho</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-pink: #ff006e;
            --neon-purple: #8338ec;
            --neon-blue: #3a86ff;
            --neon-cyan: #00f5ff;
            --neon-green: #06ffa5;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(20, 20, 40, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(131, 56, 236, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 110, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(58, 134, 255, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        /* Floating Hearts */
        .hearts-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 8s ease-in-out infinite;
            opacity: 0.4;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(26, 10, 46, 0.95) 0%, rgba(10, 10, 26, 0.98) 100%);
            backdrop-filter: blur(20px);
        }

        .login-card {
            background: var(--card-bg);
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-blue)) 1;
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 
                0 0 60px rgba(131, 56, 236, 0.3),
                0 0 100px rgba(255, 0, 110, 0.2),
                inset 0 0 60px rgba(255, 255, 255, 0.03);
            animation: cardGlow 3s ease-in-out infinite alternate;
        }

        @keyframes cardGlow {
            from { box-shadow: 0 0 60px rgba(131, 56, 236, 0.3), 0 0 100px rgba(255, 0, 110, 0.2); }
            to { box-shadow: 0 0 80px rgba(255, 0, 110, 0.4), 0 0 120px rgba(131, 56, 236, 0.3); }
        }

        .login-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); }
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        .user-select-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .user-btn {
            padding: 18px 35px;
            border: 2px solid;
            border-radius: 50px;
            background: transparent;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .user-btn.aqib {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(58, 134, 255, 0.3);
        }

        .user-btn.aqib:hover {
            background: var(--neon-blue);
            box-shadow: 0 0 40px rgba(58, 134, 255, 0.6);
            transform: translateY(-5px) scale(1.05);
        }

        .user-btn.sara {
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .user-btn.sara:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.6);
            transform: translateY(-5px) scale(1.05);
        }

        /* Chat Header */
        .chat-header {
            background: var(--card-bg);
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, transparent, var(--neon-purple), var(--neon-pink), var(--neon-purple), transparent) 1;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 25px 25px 0 0;
            backdrop-filter: blur(20px);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .love-icon {
            font-size: 2rem;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        .header-info h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .current-user-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            animation: badgePulse 2s infinite;
        }

        .current-user-badge.aqib {
            background: linear-gradient(135deg, rgba(58, 134, 255, 0.3), rgba(58, 134, 255, 0.1));
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(58, 134, 255, 0.4);
        }

        .current-user-badge.sara {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.3), rgba(255, 0, 110, 0.1));
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--neon-purple), var(--neon-pink));
            border-radius: 10px;
        }

        /* Message Bubble */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: messageSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-wrapper.aqib {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.sara {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-sender {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        .message-wrapper.aqib .message-sender {
            color: var(--neon-blue);
        }

        .message-wrapper.sara .message-sender {
            color: var(--neon-pink);
        }

        .message-bubble {
            padding: 14px 20px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            overflow-wrap: break-word;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1.5;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .message-wrapper.aqib .message-bubble {
            background: linear-gradient(135deg, rgba(58, 134, 255, 0.25), rgba(58, 134, 255, 0.15));
            border: 1px solid rgba(58, 134, 255, 0.4);
            border-bottom-right-radius: 5px;
            color: white;
            box-shadow: 0 5px 20px rgba(58, 134, 255, 0.2);
        }

        .message-wrapper.sara .message-bubble {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.25), rgba(255, 0, 110, 0.15));
            border: 1px solid rgba(255, 0, 110, 0.4);
            border-bottom-left-radius: 5px;
            color: white;
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.2);
        }

        .message-bubble:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(131, 56, 236, 0.3);
        }

        .message-time {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            padding: 0 10px;
        }

        /* Reaction Popup */
        .reaction-popup {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            gap: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .reaction-popup.show {
            transform: translateX(-50%) scale(1);
        }

        .reaction-emoji {
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 5px;
            border-radius: 50%;
        }

        .reaction-emoji:hover {
            transform: scale(1.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .message-reaction {
            position: absolute;
            bottom: calc(100% + 5px);
            right: 10px;
            font-size: 1.3rem;
            animation: reactionPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 8px currentColor);
        }

        @keyframes reactionPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 50, 50, 0.9);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .message-wrapper:hover .delete-btn {
            display: flex;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 1);
            transform: scale(1.1);
        }

        /* Input Area */
        .input-area {
            background: var(--card-bg);
            border-top: 2px solid;
            border-image: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-purple), transparent) 1;
            padding: 20px;
            border-radius: 0 0 25px 25px;
            backdrop-filter: blur(20px);
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.3);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            position: relative;
        }

        .message-input-container {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 16px 25px;
            border: 2px solid rgba(131, 56, 236, 0.4);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            min-height: 55px;
            max-height: 150px;
            line-height: 1.4;
        }

        .message-input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 25px rgba(131, 56, 236, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 25px rgba(255, 0, 110, 0.4);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 8px 35px rgba(255, 0, 110, 0.6);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Status Indicator */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 5px var(--neon-green); }
            50% { box-shadow: 0 0 15px var(--neon-green), 0 0 25px var(--neon-green); }
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-style: italic;
        }

        .typing-indicator.show {
            display: flex;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-purple);
            animation: typingBounce 1.4s infinite both;
        }

        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card-bg);
            border: 1px solid var(--neon-purple);
            padding: 15px 30px;
            border-radius: 15px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(131, 56, 236, 0.4);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-title {
                font-size: 2.2rem;
            }

            .login-card {
                padding: 35px 25px;
            }

            .user-btn {
                padding: 14px 28px;
                font-size: 1.1rem;
            }

            .chat-header {
                padding: 12px 15px;
            }

            .header-info h2 {
                font-size: 1.4rem;
            }

            .message-wrapper {
                max-width: 85%;
            }

            .message-bubble {
                padding: 12px 16px;
                font-size: 0.95rem;
            }

            .input-area {
                padding: 15px;
            }

            .message-input {
                padding: 14px 20px;
                font-size: 0.95rem;
            }

            .send-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .login-title {
                font-size: 1.8rem;
            }

            .user-select-container {
                flex-direction: column;
                align-items: stretch;
            }

            .header-left {
                gap: 8px;
            }

            .love-icon {
                font-size: 1.5rem;
            }

            .header-info h2 {
                font-size: 1.2rem;
            }

            .current-user-badge {
                padding: 6px 14px;
                font-size: 0.8rem;
            }

            .message-wrapper {
                max-width: 90%;
            }
        }

        /* Loading Animation */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sound-toggle:hover {
            background: rgba(131, 56, 236, 0.3);
            transform: scale(1.1);
        }

        /* Message Count Badge */
        .message-count {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            z-index: 500;
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation"></div>

    <!-- Floating Hearts -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1 class="login-title">Aqib 💞 Sara</h1>
            <p class="login-subtitle">yeh ho ❤️ Our Love Story</p>
            
            <div class="user-select-container">
                <button class="user-btn aqib" onclick="loginAs('Aqib')">
                    💙 I'm Aqib
                </button>
                <button class="user-btn sara" onclick="loginAs('Sara')">
                    💗 I'm Sara
                </button>
            </div>

            <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 20px;">
                ✨ Only for us two ✨<br>
                No one else can join our private chat 💕
            </p>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div class="main-container hidden" id="chatInterface">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <span class="love-icon">💕</span>
                <div class="header-info">
                    <h2>Aqib & Sara Forever</h2>
                    <p>💞 Connected by Love 💞</p>
                </div>
            </div>
            <div class="current-user-badge" id="currentUserBadge">Aqib</div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <span id="typingUser">Sara</span> is typing
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Messages Container -->
        <div class="messages-container" id="messagesContainer">
            <!-- Messages will be loaded here -->
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="status-bar">
                <div class="status-dot"></div>
                <span>Connected • Private & Secure 💖</span>
            </div>
            <div class="input-wrapper">
                <div class="message-input-container">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Type your love message... 💕"
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                </div>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                    💝
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Sound Toggle Button -->
    <button class="sound-toggle hidden" id="soundToggle" onclick="toggleSound()">
        🔊
    </button>

    <!-- Message Count -->
    <div class="message-count hidden" id="messageCount">
        Messages: 0/500
    </div>

    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            endpoint: 'https://fra.cloud.appwrite.io/v1',
            projectId: '69ece6510006b3f2bc8d',
            databaseId: '69ece6da000ae6d364d0',
            collectionId: 'messages',
            maxMessages: 500,
            allowedUsers: ['Aqib', 'Sara']
        };

        // ==================== APPWRITE INITIALIZATION ====================
        const { Client, Databases, ID, Permission, Role, Realtime } = Appwrite;

        const client = new Client()
            .setEndpoint(CONFIG.endpoint)
            .setProject(CONFIG.projectId);

        const databases = new Databases(client);
        
        // For realtime subscriptions
        let realtimeSubscription = null;

        // ==================== STATE MANAGEMENT ====================
        let currentUser = null;
        let soundEnabled = true;
        let messages = [];
        let isTyping = false;

        // ==================== AUDIO SYSTEM ====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            
            initAudio();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            switch(type) {
                case 'send':
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialDecayTo && gainNode.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.4);
                    break;
                    
                case 'receive':
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime); // G5
                    oscillator.frequency.setValueAtTime(987.77, audioCtx.currentTime + 0.08); // B5
                    oscillator.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.16); // C6
                    gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                    
                case 'login':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.15);
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.5);
                    break;
                    
                case 'reaction':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.15);
                    break;
                    
                case 'delete':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime + 0.15);
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
                    
                case 'notification':
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
            showToast(soundEnabled ? '🔊 Sound On' : '🔇 Sound Off');
        }

        // ==================== FLOATING HEARTS ====================
        function createFloatingHearts() {
            const container = document.getElementById('heartsContainer');
            const hearts = ['❤️', '💕', '💖', '💗', '💘', '💝', '💞', '💟', '❣️', '🩷', '🤍', '💜'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.color = `hsl(${Math.random() * 60 + 320}, 100%, 65%)`;
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 10000);
            }, 800);
        }

        // ==================== LOGIN SYSTEM ====================
        async function loginAs(username) {
            if (!CONFIG.allowedUsers.includes(username)) {
                showToast('❌ Access Denied! Only Aqib & Sara can join!');
                return;
            }
            
            currentUser = username;
            playSound('login');
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatInterface').classList.remove('hidden');
            document.getElementById('soundToggle').classList.remove('hidden');
            document.getElementById('messageCount').classList.remove('hidden');
            
            const badge = document.getElementById('currentUserBadge');
            badge.textContent = username;
            badge.className = `current-user-badge ${username.toLowerCase()}`;
            
            showToast(`💕 Welcome ${username}! 💕`);
            
            await loadMessages();
            subscribeToRealtime();
            scrollToBottom();
        }

        // ==================== DATABASE OPERATIONS ====================
        async function ensureCollectionExists() {
            try {
                // Try to list documents to check if collection exists
                await databases.listDocuments(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    [Query.limit(1)]
                );
            } catch (error) {
                console.log('Collection might not exist or other error:', error);
                // The collection should be created manually in Appwrite Console
                // or we show instructions
            }
        }

        async function loadMessages() {
            try {
                const response = await databases.listDocuments(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    [
                        Query.orderDesc('$createdAt'),
                        Query.limit(CONFIG.maxMessages)
                    ]
                );
                
                messages = response.documents.reverse();
                renderMessages();
                updateMessageCount();
                
            } catch (error) {
                console.error('Error loading messages:', error);
                showToast('⚠️ Loading messages...');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;
            
            try {
                const messageData = {
                    sender: currentUser,
                    text: text,
                    reaction: '',
                    timestamp: new Date().toISOString()
                };
                
                // Check message count and delete oldest if needed
                if (messages.length >= CONFIG.maxMessages) {
                    const oldestMessage = messages[0];
                    await databases.deleteDocument(
                        CONFIG.databaseId,
                        CONFIG.collectionId,
                        oldestMessage.$id
                    );
                }
                
                const response = await databases.createDocument(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    ID.unique(),
                    messageData,
                    [Permission.read(Role.any()), Permission.write(Role.any())]
                );
                
                messages.push(response);
                input.value = '';
                autoResize(input);
                
                playSound('send');
                renderMessages();
                scrollToBottom();
                updateMessageCount();
                
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('❌ Failed to send message');
            }
        }

        async function deleteMessage(messageId) {
            if (!confirm('Delete this message?')) return;
            
            try {
                await databases.deleteDocument(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    messageId
                );
                
                messages = messages.filter(m => m.$id !== messageId);
                playSound('delete');
                renderMessages();
                updateMessageCount();
                showToast('🗑️ Message deleted');
                
            } catch (error) {
                console.error('Error deleting message:', error);
                showToast('❌ Failed to delete');
            }
        }

        async function addReaction(messageId, emoji) {
            try {
                await databases.updateDocument(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    messageId,
                    { reaction: emoji }
                );
                
                const message = messages.find(m => m.$id === messageId);
                if (message) {
                    message.reaction = emoji;
                }
                
                playSound('reaction');
                renderMessages();
                
            } catch (error) {
                console.error('Error adding reaction:', error);
            }
        }

        // ==================== REALTIME SUBSCRIPTION ====================
        function subscribeToRealtime() {
            // Clean up existing subscription
            if (realtimeSubscription) {
                realtimeSubscription.close();
            }
            
            // Subscribe to documents channel
            client.subscribe(`databases.${CONFIG.databaseId}.collections.${CONFIG.collectionId}.documents`, (response) => {
                console.log('Realtime event:', response.events);
                
                if (response.events.includes('databases.*.collections.*.documents.create')) {
                    // New message created
                    const newMessage = response.payload;
                    
                    // Don't add duplicate if it's our own message
                    if (newMessage.sender !== currentUser) {
                        // Check if already exists
                        const exists = messages.some(m => m.$id === newMessage.$id);
                        if (!exists) {
                            messages.push(newMessage);
                            playSound('receive');
                            renderMessages();
                            scrollToBottom();
                            updateMessageCount();
                            
                            // Show notification if not focused
                            if (document.hidden) {
                                playSound('notification');
                                showToast(`💕 New message from ${newMessage.sender}`);
                            }
                        }
                    }
                }
                
                if (response.events.includes('databases.*.collections.*.documents.delete')) {
                    // Message deleted
                    const deletedId = response.payload.$id;
                    messages = messages.filter(m => m.$id !== deletedId);
                    renderMessages();
                    updateMessageCount();
                }
                
                if (response.events.includes('databases.*.collections.*.documents.update')) {
                    // Message updated (reaction added)
                    const updatedMessage = response.payload;
                    const index = messages.findIndex(m => m.$id === updatedMessage.$id);
                    if (index !== -1) {
                        messages[index] = updatedMessage;
                        renderMessages();
                    }
                }
            });
        }

        // ==================== UI RENDERING ====================
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            messages.forEach((msg, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.sender.toLowerCase()}`;
                wrapper.dataset.messageId = msg.$id;
                
                const time = new Date(msg.$createdAt).toLocaleTimeString([], { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                wrapper.innerHTML = `
                    <span class="message-sender">${msg.sender}</span>
                    <div class="message-bubble" onclick="showReactionPopup(event, '${msg.$id}')">
                        ${escapeHtml(msg.text)}
                        ${msg.reaction ? `<span class="message-reaction">${msg.reaction}</span>` : ''}
                        <div class="reaction-popup" id="popup-${msg.$id}">
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '❤️')">❤️</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '😍')">😍</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '💕')">💕</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '😘')">😘</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '🥰')">🥰</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '💖')">💖</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '✨')">✨</span>
                            <span class="reaction-emoji" onclick="event.stopPropagation(); addReaction('${msg.$id}', '🔥')">🔥</span>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteMessage('${msg.$id}')">×</button>
                    </div>
                    <span class="message-time">${time}</span>
                `;
                
                container.appendChild(wrapper);
            });
        }

        function showReactionPopup(event, messageId) {
            // Close all other popups first
            document.querySelectorAll('.reaction-popup.show').forEach(popup => {
                popup.classList.remove('show');
            });
            
            const popup = document.getElementById(`popup-${messageId}`);
            if (popup) {
                popup.classList.add('show');
                
                // Close when clicking outside
                setTimeout(() => {
                    document.addEventListener('click', function closePopup(e) {
                        if (!popup.contains(e.target)) {
                            popup.classList.remove('show');
                            document.removeEventListener('click', closePopup);
                        }
                    }, { once: true });
                }, 10);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        function updateMessageCount() {
            const countEl = document.getElementById('messageCount');
            countEl.textContent = `Messages: ${messages.length}/${CONFIG.maxMessages}`;
        }

        // ==================== INPUT HANDLING ====================
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==================== QUERY IMPORT ====================
        // Import Query from Appwrite
        const { Query } = Appwrite;

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            createFloatingHearts();
            
            // Initialize audio context on first user interaction
            document.body.addEventListener('click', () => {
                initAudio();
            }, { once: true });
            
            console.log('💕 Aqib & Sara Chat Initialized 💕');
            console.log('📡 Connecting to Appwrite...');
            console.log(`🔗 Endpoint: ${CONFIG.endpoint}`);
            console.log(`🆔 Project: ${CONFIG.projectId}`);
            console.log(`💾 Database: ${CONFIG.databaseId}`);
        });

        // ==================== VISIBILITY CHANGE ====================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && currentUser) {
                // Page became visible again, refresh messages
                loadMessages();
            }
        });
    </script>
</body>
</html>
