<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqib 💞 Sara yeh ho</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(255, 0, 128, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255, 105, 180, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-30px, 30px) rotate(120deg); }
            66% { transform: translate(30px, -30px) rotate(240deg); }
        }

        /* Floating Hearts */
        .floating-hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 8s linear infinite;
            opacity: 0.3;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 60px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                        inset 0 0 60px rgba(255, 107, 157, 0.05);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 60px rgba(255, 107, 157, 0.05), 0 0 30px rgba(255, 0, 128, 0.1); }
            50% { box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 80px rgba(255, 107, 157, 0.1), 0 0 50px rgba(255, 0, 128, 0.2); }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff0080, #ff69b4, #00d4ff, #ff0080);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(255, 0, 128, 0.5);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 107, 157, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #ff0080;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.4),
                        inset 0 0 20px rgba(255, 0, 128, 0.1);
            transform: translateY(-2px);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 0, 128, 0.5);
        }

        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Main Chat Interface */
        .chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .chat-header {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 107, 157, 0.2);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .partner-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
            animation: avatarGlow 2s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 128, 0.5); }
            50% { box-shadow: 0 0 35px rgba(255, 0, 128, 0.8), 0 0 50px rgba(255, 107, 157, 0.4); }
        }

        .header-info h2 {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4ade80;
            font-size: 0.85rem;
            margin-top: 3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .header-right {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .icon-btn:hover {
            background: rgba(255, 0, 128, 0.3);
            border-color: #ff0080;
            transform: scale(1.1);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #ff0080, #ff69b4);
            border-radius: 10px;
        }

        .message {
            max-width: 70%;
            margin-bottom: 20px;
            position relative;
            animation: messageIn 0.4s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.sent {
            margin-left: auto;
        }

        .message-content {
            padding: 16px 22px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.received .message-content {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message.sent .message-content {
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 5px 20px rgba(255, 0, 128, 0.3);
        }

        .message-sender {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .message-time {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
            text-align: right;
        }

        /* Reactions */
        .reactions-container {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .reaction-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            color: white;
        }

        .reaction-btn:hover {
            background: rgba(255, 0, 128, 0.3);
            border-color: #ff0080;
            transform: scale(1.15);
        }

        .reaction-btn.active {
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            border-color: transparent;
        }

        /* Gift Messages */
        .gift-message {
            text-align: center;
            max-width: 85%;
            margin: 25px auto;
        }

        .gift-box {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 107, 157, 0.2));
            border: 2px solid gold;
            border-radius: 20px;
            padding: 25px;
            animation: giftPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        @keyframes giftPop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .gift-box::before {
            content: '✨';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { transform: rotate(0deg) scale(1); opacity: 1; }
            50% { transform: rotate(180deg) scale(1.3); opacity: 0.7; }
        }

        .gift-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            display: block;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .gift-text {
            color: gold;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .gift-from {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* Input Area */
        .input-area {
            background: rgba(15, 12, 41, 0.98);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-top: 1px solid rgba(255, 107, 157, 0.2);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .main-input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 16px 55px 16px 22px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 107, 157, 0.3);
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            resize: none;
            outline: none;
            min-height: 56px;
            max-height: 150px;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            border-color: #ff0080;
            box-shadow: 0 0 25px rgba(255, 0, 128, 0.3);
        }

        .input-actions {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            position: relative;
        }

        .emoji-btn {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.3), rgba(255, 152, 0, 0.3));
            border: 2px solid rgba(255, 193, 7, 0.5);
        }

        .emoji-btn:hover {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.5), rgba(255, 152, 0, 0.5));
            transform: scale(1.1) rotate(10deg);
        }

        .gift-btn {
            background: linear-gradient(135deg, rgba(255, 0, 128, 0.3), rgba(255, 105, 180, 0.3));
            border: 2px solid rgba(255, 0, 128, 0.5);
        }

        .gift-btn:hover {
            background: linear-gradient(135deg, rgba(255, 0, 128, 0.5), rgba(255, 105, 180, 0.5));
            transform: scale(1.1) rotate(-10deg);
        }

        .send-btn {
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            border: none;
            color: white;
            font-size: 1.5rem;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 25px rgba(255, 0, 128, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Emoji Picker */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: rgba(30, 26, 58, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 20px;
            padding: 20px;
            width: 350px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            z-index: 100;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-categories {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .category-tab:hover, .category-tab.active {
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            border-color: transparent;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }

        .emoji-item {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .emoji-item:hover {
            background: rgba(255, 0, 128, 0.3);
            transform: scale(1.2);
        }

        /* Gift Picker */
        .gift-picker {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 70px;
            background: rgba(30, 26, 58, 0.98);
            backdrop-filter: blur(20px);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 20px;
            width: 320px;
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.3);
            z-index: 100;
            animation: slideUp 0.3s ease;
        }

        .gift-title {
            color: gold;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.1rem;
        }

        .gift-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .gift-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            border-radius: 15px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .gift-item:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            margin-bottom: 15px;
        }

        .typing-dots {
            display: flex;
            gap: 6px;
        }

        .typing-dots span {
            width: 10px;
            height: 10px;
            background: #ff69b4;
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            color: white;
            padding: 16px 28px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(255, 0, 128, 0.5);
            z-index: 1000;
            display: none;
            animation: toastIn 0.4s ease;
            font-weight: 500;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-box {
                padding: 40px 25px;
            }

            .logo h1 {
                font-size: 1.8rem;
            }

            .chat-header {
                padding: 15px 20px;
            }

            .messages-area {
                padding: 20px;
            }

            .message {
                max-width: 85%;
            }

            .input-area {
                padding: 15px 20px;
            }

            .emoji-picker {
                width: calc(100vw - 40px);
                right: -10px;
            }

            .gift-picker {
                width: calc(100vw - 60px);
                right: -10px;
            }
        }

        /* Love Animation Overlay */
        .love-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        .love-particle {
            position: absolute;
            font-size: 24px;
            animation: loveFloat 2s ease-out forwards;
        }

        @keyframes loveFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1.5) rotate(360deg);
            }
        }

        /* Online Status Badge */
        .online-badge {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid #4ade80;
            padding: 10px 18px;
            border-radius: 25px;
            color: #4ade80;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        /* Scroll to Bottom Button */
        .scroll-bottom {
            position: fixed;
            bottom: 160px;
            right: 25px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0080, #ff69b4);
            border: none;
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 5px 20px rgba(255, 0, 128, 0.4);
            z-index: 50;
            transition: all 0.3s ease;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .scroll-bottom:hover {
            transform: scale(1.1);
        }

        /* Message Count Display */
        .msg-count {
            position: fixed;
            bottom: 165px;
            right: 32px;
            background: #ff0080;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Floating Hearts -->

        // ==================== APPWRITE SETUP ====================
        async function setupAppwrite() {
            try {
                client = new Appwrite.Client()
                    .setEndpoint(CONFIG.endpoint)
                    .setProject(CONFIG.projectId);

                databases = new Appwrite.Databases(client);

                console.log('Appwrite initialized successfully');
                return true;
            } catch (error) {
                console.error('Appwrite initialization error:', error);
                return false;
            }
        }

        // ==================== LOGIN HANDLING ====================
        function handleLogin() {
            const username = document.getElementById('usernameInput').value.trim().toLowerCase();
            const errorMsg = document.getElementById('errorMsg');

            if (!CONFIG.allowedUsers.includes(username)) {
                errorMsg.style.display = 'block';
                setTimeout(() => errorMsg.style.display = 'none', 3000);
                return;
            }

            currentUser = username.charAt(0).toUpperCase() + username.slice(1);
            partnerUser = username === 'aqib' ? 'Sara' : 'Aqib';

            localStorage.setItem('chatUser', currentUser);
            
            enterChat();
        }

        function checkAutoLogin() {
            const savedUser = localStorage.getItem('chatUser');
            if (savedUser && CONFIG.allowedUsers.includes(savedUser.toLowerCase())) {
                currentUser = savedUser;
                partnerUser = currentUser.toLowerCase() === 'aqib' ? 'Sara' : 'Aqib';
                enterChat();
            }
        }

        async function enterChat() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            
            document.getElementById('partnerAvatar').textContent = partnerUser[0];
            document.getElementById('partnerName').textContent = partnerUser + ' 💕';
            document.getElementById('onlineText').textContent = partnerUser + ' is online';

            const success = await setupAppwrite();
            if (success) {
                await loadMessages();
                subscribeToMessages();
            } else {
                showToast('Using local storage mode');
                loadLocalMessages();
            }

            playSound('login');
            showLoveAnimation();
        }

        function logout() {
            localStorage.removeItem('chatUser');
            location.reload();
        }

        // ==================== MESSAGE FUNCTIONS ====================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            const message = {
                sender: currentUser,
                receiver: partnerUser,
                content: text,
                type: 'text',
                timestamp: new Date().toISOString(),
                reactions: []
            };

            try {
                await databases.createDocument(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    Appwrite.ID.unique(),
                    message
                );
                
                input.value = '';
                autoResize(input);
                playSound('send');
                scrollToBottom(true);
            } catch (error) {
                console.error('Send error:', error);
                saveMessageLocally(message);
                input.value = '';
                autoResize(input);
                playSound('send');
                displayMessage(message);
            }
        }

        async function sendGift(emoji, name) {
            const giftMessage = {
                sender: currentUser,
                receiver: partnerUser,
                type: 'gift',
                giftEmoji: emoji,
                giftName: name,
                content: `Sent you a ${name}! ${emoji}`,
                timestamp: new Date().toISOString(),
                reactions: []
            };

            try {
                await databases.createDocument(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    Appwrite.ID.unique(),
                    giftMessage
                );
                
                toggleGiftPicker();
                playSound('gift');
                showLoveAnimation();
                scrollToBottom(true);
            } catch (error) {
                console.error('Gift error:', error);
                saveMessageLocally(giftMessage);
                toggleGiftPicker();
                playSound('gift');
                showLoveAnimation();
                displayMessage(giftMessage);
            }
        }

        async function loadMessages() {
            try {
                const response = await databases.listDocuments(
                    CONFIG.databaseId,
                    CONFIG.collectionId,
                    [Appwrite.Query.orderDesc('$createdAt'), Appwrite.Query.limit(CONFIG.maxMessages)]
                );

                const messages = response.documents.reverse();
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = '';

                messages.forEach(msg => displayMessage(msg));

                scrollToBottom(true);
            } catch (error) {
                console.error('Load messages error:', error);
                loadLocalMessages();
            }
        }

        function saveMessageLocally(message) {
            let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages.push(message);
            
            if (messages.length > CONFIG.maxMessages) {
                messages = messages.slice(-CONFIG.maxMessages);
            }
            
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }

        function loadLocalMessages() {
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';

            messages.forEach(msg => displayMessage(msg));
            scrollToBottom(true);
        }

        function displayMessage(msg) {
            const messagesArea = document.getElementById('messagesArea');
            const isSent = msg.sender === currentUser;
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let messageHTML = '';

            if (msg.type === 'gift') {
                messageHTML = `
                    <div class="gift-message">
                        <div class="gift-box">
                            <span class="gift-emoji">${msg.giftEmoji}</span>
                            <div class="gift-text">${msg.giftName} 🎁</div>
                            <div class="gift-from">From ${msg.sender} • ${time}</div>
                        </div>
                    </div>
                `;
            } else {
                messageHTML = `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-sender">${isSent ? 'You' : msg.sender}</div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${time}</div>
                        <div class="reactions-container">
                            ${REACTIONS.map(r => 
                                `<button class="reaction-btn ${(msg.reactions || []).includes(r) ? 'active' : ''}" 
                                 onclick="addReaction('${msg.$id || msg.timestamp}', '${r}')">${r}</button>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            messagesArea.insertAdjacentHTML('beforeend', messageHTML);

            if (!isSent && msg.type !== 'gift') {
                playSound('receive');
            } else if (msg.type === 'gift') {
                playSound('gift');
            }
        }

        async function addReaction(messageId, reaction) {
            playSound('reaction');
            showToast(`You reacted with ${reaction}`);
            
            // In real implementation, update the message in Appwrite
            // For now, just show visual feedback
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== REAL-TIME SUBSCRIPTION ====================
        function subscribeToMessages() {
            try {
                client.subscribe(`databases.${CONFIG.databaseId}.collections.${CONFIG.collectionId}.documents`, (response) => {
                    if (response.events.includes('create')) {
                        const newMsg = response.payload;
                        if (newMsg.sender !== currentUser) {
                            displayMessage(newMsg);
                            scrollToBottom(true);
                            showNotification(`${newMsg.sender} sent a message`);
                        }
                    }
                });
            } catch (error) {
                console.error('Subscription error:', error);
            }
        }

        // ==================== UI FUNCTIONS ====================
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            const giftPicker = document.getElementById('giftPicker');
            giftPicker.style.display = 'none';
            picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
        }

        function toggleGiftPicker() {
            const picker = document.getElementById('giftPicker');
            const emojiPicker = document.getElementById('emojiPicker');
            emojiPicker.style.display = 'none';
            picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = event.target.closest('.icon-btn');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            showToast(soundEnabled ? 'Sound On 🔊' : 'Sound Off 🔇');
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        function scrollToBottom(force = false) {
            const area = document.getElementById('messagesArea');
            const scrollBtn = document.getElementById('scrollBottom');
            
            if (force) {
                area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
                scrollBtn.style.display = 'none';
            } else {
                const isNearBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 200;
                scrollBtn.style.display = isNearBottom ? 'none' : 'flex';
            }
        }

        document.getElementById('messagesArea').addEventListener('scroll', function() {
            scrollToBottom();
        });

        // Close pickers when clicking outside
        document.addEventListener('click', function(e) {
            const emojiPicker = document.getElementById('emojiPicker');
            const giftPicker = document.getElementById('giftPicker');
            const emojiBtn = document.querySelector('.emoji-btn');
            const giftBtn = document.querySelector('.gift-btn');

            if (!emojiPicker.contains(e.target) && !emojiBtn.contains(e.target)) {
                emojiPicker.style.display = 'none';
            }
            if (!giftPicker.contains(e.target) && !giftBtn.contains(e.target)) {
                giftPicker.style.display = 'none';
            }
        });

        // ==================== SOUND FUNCTIONS ====================
        function playSound(type) {
            if (!soundEnabled) return;

            const sounds = SOUNDS[type];
            if (sounds && sounds.length > 0) {
                const audio = new Audio(sounds[Math.floor(Math.random() * sounds.length)]);
                audio.volume = 0.5;
                audio.play().catch(() => {});
            }
        }

        // ==================== ANIMATION FUNCTIONS ====================
        function showLoveAnimation() {
            const overlay = document.getElementById('loveOverlay');
            overlay.style.display = 'block';

            const hearts = ['💕', '💖', '💗', '💝', '❤️', '🌹', '✨', '💫', '💞'];

            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'love-particle';
                    particle.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.bottom = '20%';
                    overlay.appendChild(particle);

                    setTimeout(() => particle.remove(), 2000);
                }, i * 100);
            }

            setTimeout(() => {
                overlay.style.display = 'none';
            }, 2500);
        }

        // ==================== NOTIFICATION FUNCTIONS ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function showNotification(message) {
            if (document.hidden) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('💞 Aqib & Sara', {
                        body: message,
                        icon: '❤️'
                    });
                }
            }
            showToast(message);
            playSound('notification');
        }

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // ==================== UTILITY FUNCTIONS ====================
        console.log('%c💞 Aqib & Sara - Made with Love 💞', 
            'color: #ff0080; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);');
        console.log('%cThis chat is exclusively for Aqib & Sara ❤️', 
            'color: #ff69b4; font-size: 14px;');
    </script>
</body>
</html>
